<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DolmeD — Mon panier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#336CA8;--teal:#54BCB8;--green:#6FA84B;--navy:#1b356d;--sand:#f4efe7;--ink:#2b3a52;--line:#e6ddd0;--r:14px;--shadow:0 8px 24px rgba(27,53,109,.08)}
*{box-sizing:border-box}
body{margin:0;font-family:'Manrope',system-ui,sans-serif;color:var(--ink);background:#faf7f2}
a{color:inherit}
header{background:#fff;border-bottom:1px solid var(--line)}
.nav{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:22px;padding:14px 20px}
.nav .logo img{height:44px;display:block}
.nav a{text-decoration:none;font-weight:600;color:var(--navy)}
.nav a:not(.logo):hover{color:var(--teal)}
.nav .cart{margin-left:auto;display:inline-flex;align-items:center;gap:7px;color:var(--blue)}
.nav .cart svg{width:20px;height:20px}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
h1{font-family:'Comfortaa',system-ui,sans-serif;color:var(--navy);font-size:28px;margin:10px 0 24px}
.grid{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.lignes{padding:6px 18px}
.ligne{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}
.ligne:last-child{border-bottom:0}
.ligne .nom{font-weight:600;color:var(--navy)}
.ligne .sc{font-size:13px;color:#7c8598;margin-top:2px}
.ligne .fmt{font-size:12px;color:#9aa2b1;margin-top:2px}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:24px;overflow:hidden}
.qty button{width:32px;height:32px;border:0;background:#fff;color:var(--navy);font-size:18px;cursor:pointer}
.qty button:hover{background:var(--sand)}
.qty span{min-width:30px;text-align:center;font-weight:600}
.pu{color:#7c8598;font-size:14px;white-space:nowrap}
.lt{font-weight:700;color:var(--navy);white-space:nowrap}
.rm{border:0;background:none;color:#b9435b;cursor:pointer;font-size:18px;line-height:1;padding:4px}
.empty{padding:48px 20px;text-align:center;color:#7c8598}
.empty a{color:var(--teal);font-weight:600;text-decoration:none}
.sum{padding:20px}
.sum h2{font-family:'Comfortaa',system-ui,sans-serif;font-size:18px;color:var(--navy);margin:0 0 14px}
.row{display:flex;justify-content:space-between;padding:8px 0;font-size:15px}
.row.total{border-top:1px solid var(--line);margin-top:8px;padding-top:14px;font-size:19px;font-weight:700;color:var(--navy)}
.muted{color:#7c8598}
.free{color:var(--green);font-weight:600}
.promo{display:flex;gap:8px;margin:12px 0}
.promo input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit}
.promo button{padding:10px 16px;border:0;border-radius:10px;background:var(--navy);color:#fff;font-weight:600;cursor:pointer}
.promo button:hover{background:var(--blue)}
.msg{font-size:13px;margin-top:-4px;margin-bottom:8px}
.msg.ok{color:var(--green)}
.msg.err{color:#b9435b}
.pay{margin:16px 0 4px}
.pay h3{font-size:15px;color:var(--navy);margin:0 0 8px}
.pay label{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer}
.pay label.dis{opacity:.55;cursor:not-allowed}
.pay .soon{margin-left:auto;font-size:11px;background:var(--sand);color:#8a7f6d;padding:3px 8px;border-radius:20px}
.fields{margin-top:8px}
.fields label{display:block;font-size:13px;color:var(--navy);font-weight:600;margin:10px 0 4px}
.fields input,.fields textarea,.fields select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font:inherit}
.fields textarea{min-height:64px;resize:vertical}
.cmd{width:100%;margin-top:16px;padding:15px;border:0;border-radius:30px;background:var(--teal);color:#fff;font-weight:700;font-size:16px;cursor:pointer}
.cmd:hover{background:#3fa6a2}
.cmd:disabled{background:#c7cdd6;cursor:not-allowed}
.noref{font-size:12px;color:#9aa2b1;margin-top:10px;text-align:center}
.back{display:inline-block;margin-top:18px;color:var(--teal);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<header><nav class="nav">
  <a class="logo" href="index.html"><img src="logo.png" alt="DolmeD distribution" id="logoImg" style="height:44px"></a>
  <a href="boutique.html">Boutique</a><a href="packs.html">Packs &amp; Promos</a>
  <a class="cart" id="cartLink" href="panier.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    Panier (<span id="cartCount">0</span>)
  </a>
</nav></header>

<div class="wrap">
  <h1>Mon panier</h1>
  <div class="grid">

    <div class="card">
      <div class="lignes" id="lignes"></div>
    </div>

    <div class="card sum">
      <h2>Récapitulatif</h2>
      <div class="row"><span class="muted">Sous-total</span><span id="sousTotal">0,000 DT</span></div>
      <div class="row" id="rowRemise" style="display:none"><span class="muted">Remise (−15 %)</span><span id="remise">0,000 DT</span></div>

      <div class="promo">
        <input type="text" id="codeInput" placeholder="Code promo">
        <button type="button" id="applyCode">Appliquer</button>
      </div>
      <p style="font-size:12.5px;color:#7c8598;margin:2px 0 8px">Vous avez un code promo ? Saisissez-le ici. <a href="compte.html" style="color:var(--teal);font-weight:600;text-decoration:none">Créer un compte → −15 %</a></p>
      <div class="msg" id="codeMsg"></div>

      <div class="row"><span class="muted">Livraison</span><span id="livraison">—</span></div>
      <div class="row total"><span>Total</span><span id="total">0,000 DT</span></div>

      <div class="pay">
        <h3>Mode de règlement</h3>
        <label><input type="radio" name="paiement" value="Cash à la livraison" checked> Cash à la livraison</label>
        <label><input type="radio" name="paiement" value="Chèque à la livraison"> Chèque à la livraison</label>
        <label class="dis"><input type="radio" name="paiement" value="Carte bancaire" disabled> Carte bancaire <span class="soon">bientôt</span></label>
      </div>

      <!-- Formulaire Netlify -->
      <form name="commande" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="commande-merci.html" id="formCmd" class="fields">
        <input type="hidden" name="form-name" value="commande">
        <p style="display:none"><label>Ne pas remplir <input name="bot-field"></label></p>

        <input type="hidden" name="numero" id="fNumero">
        <input type="hidden" name="sous_total" id="fSousTotal">
        <input type="hidden" name="remise" id="fRemise">
        <input type="hidden" name="code_promo" id="fCode">
        <input type="hidden" name="frais_livraison" id="fLiv">
        <input type="hidden" name="total" id="fTotal">
        <input type="hidden" name="mode_paiement" id="fPaie">
        <textarea name="recapitulatif" id="fRecap" style="display:none"></textarea>

        <label for="nom">Nom complet</label>
        <input id="nom" name="nom" type="text" required autocomplete="name">
        <label for="tel">Téléphone</label>
        <input id="tel" name="telephone" type="tel" required autocomplete="tel" inputmode="tel">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required autocomplete="email" inputmode="email">
        <label for="pays">Pays</label>
        <select id="pays" name="pays">
          <option value="Tunisie" selected>Tunisie</option>
          <option value="Algérie">Algérie</option>
          <option value="Maroc">Maroc</option>
          <option value="France">France</option>
          <option value="Autre">Autre</option>
        </select>
        <label for="ville">Ville</label>
        <input id="ville" name="ville" type="text" required autocomplete="address-level2">
        <label for="adresse">Adresse de livraison</label>
        <input id="adresse" name="adresse" type="text" required autocomplete="street-address">
        <label for="note">Note (facultatif)</label>
        <textarea id="note" name="note"></textarea>

        <button class="cmd" type="submit" id="btnCmd">Valider ma commande</button>
        <div class="noref" id="refLabel"></div>
      </form>

      <a class="back" href="boutique.html">← Continuer mes achats</a>
    </div>
  </div>
</div>

<script src="boutique-data.js"></script>
<script>
var fmtDT=function(v){return (v==null?0:v).toFixed(3).replace('.',',')+' DT';};
var codeApplied=false;

/* N° de commande */
function genNumero(){
  var d=new Date(),p=function(n){return (n<10?'0':'')+n;};
  var rnd=Math.random().toString(36).slice(2,5).toUpperCase();
  return 'DOL-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+'-'+rnd;
}
var NUMERO=genNumero();
document.getElementById('fNumero').value=NUMERO;
document.getElementById('refLabel').textContent='N° de commande : '+NUMERO;

function majCompteur(){var el=document.getElementById('cartCount');if(el)el.textContent=Cart.count();}

function render(){
  var lignes=Cart.lignes();
  var box=document.getElementById('lignes');
  majCompteur();

  if(!lignes.length){
    box.innerHTML='<div class="empty">Votre panier est vide.<br><a href="boutique.html">Voir la boutique →</a></div>';
    document.getElementById('sousTotal').textContent=fmtDT(0);
    document.getElementById('livraison').textContent='—';
    document.getElementById('total').textContent=fmtDT(0);
    document.getElementById('rowRemise').style.display='none';
    document.getElementById('btnCmd').disabled=true;
    return;
  }
  document.getElementById('btnCmd').disabled=false;

  box.innerHTML=lignes.map(function(l){
    var p=l.produit||{};
    return '<div class="ligne" data-sku="'+l.sku+'">'
      +'<div><div class="nom">'+(p.nom||l.sku)+'</div>'
      +'<div class="sc">'+(p.senteur||'')+'</div>'
      +'<div class="fmt">'+(p.format||'')+'</div></div>'
      +'<div class="pu">'+fmtDT(l.pu)+'</div>'
      +'<div class="qty"><button type="button" data-act="moins">−</button><span>'+l.qty+'</span><button type="button" data-act="plus">+</button></div>'
      +'<div class="lt">'+fmtDT(l.total)+'</div>'
      +'<button class="rm" type="button" data-act="rm" title="Retirer">×</button>'
      +'</div>';
  }).join('');

  calcul(lignes);
}

function calcul(lignes){
  var sousTotal=lignes.reduce(function(s,l){return s+l.total;},0);
  var remise=codeApplied?sousTotal*(REGLES.remisePct/100):0;
  var base=sousTotal-remise;
  var liv=(sousTotal>=REGLES.seuilGratuite)?0:REGLES.livraison;
  var total=base+liv;

  document.getElementById('sousTotal').textContent=fmtDT(sousTotal);
  var rr=document.getElementById('rowRemise');
  if(remise>0){rr.style.display='';document.getElementById('remise').textContent='− '+fmtDT(remise);}
  else{rr.style.display='none';}
  document.getElementById('livraison').innerHTML=(liv===0)?'<span class="free">Offerte</span>':fmtDT(liv);
  document.getElementById('total').textContent=fmtDT(total);

  /* champs cachés */
  document.getElementById('fSousTotal').value=fmtDT(sousTotal);
  document.getElementById('fRemise').value=fmtDT(remise);
  document.getElementById('fCode').value=codeApplied?REGLES.codePromo:'';
  document.getElementById('fLiv').value=(liv===0?'Offerte':fmtDT(liv));
  document.getElementById('fTotal').value=fmtDT(total);
  document.getElementById('fRecap').value=lignes.map(function(l){
    var p=l.produit||{};
    return l.qty+' × '+(p.nom||l.sku)+' — '+(p.senteur||'')+' ('+(p.format||'')+') @ '+fmtDT(l.pu)+' = '+fmtDT(l.total);
  }).join('\n')+'\n\nSous-total: '+fmtDT(sousTotal)+(remise>0?'\nRemise: -'+fmtDT(remise):'')+'\nLivraison: '+(liv===0?'Offerte':fmtDT(liv))+'\nTotal: '+fmtDT(total);
}

/* interactions lignes */
document.getElementById('lignes').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b)return;
  var ligne=e.target.closest('.ligne'); if(!ligne)return;
  var sku=ligne.dataset.sku, act=b.dataset.act;
  var cur=(Cart.get().find(function(x){return x.sku===sku;})||{}).qty||0;
  if(act==='plus')Cart.setQty(sku,cur+1);
  else if(act==='moins')Cart.setQty(sku,cur-1);
  else if(act==='rm')Cart.remove(sku);
  render();
});

/* code promo */
document.getElementById('applyCode').addEventListener('click',function(){
  var val=document.getElementById('codeInput').value.trim().toUpperCase();
  var msg=document.getElementById('codeMsg');
  if(val===REGLES.codePromo){codeApplied=true;msg.className='msg ok';msg.textContent='Code appliqué : −'+REGLES.remisePct+' % (offre première commande).';}
  else{codeApplied=false;msg.className='msg err';msg.textContent=val?'Code non valide.':'Saisissez un code.';}
  render();
});

/* mode paiement -> champ caché + à la soumission */
function syncPaie(){
  var r=document.querySelector('input[name="paiement"]:checked');
  document.getElementById('fPaie').value=r?r.value:'';
}
document.querySelectorAll('input[name="paiement"]').forEach(function(r){r.addEventListener('change',syncPaie);});

document.getElementById('formCmd').addEventListener('submit',function(){
  syncPaie();
  /* passer le n° à la page merci + vider le panier après envoi */
  this.action='commande-merci.html?n='+encodeURIComponent(NUMERO);
  try{localStorage.removeItem('dolmed_cart');}catch(e){}
});

syncPaie();
render();
</script>
</body>
</html>
