<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DolmeD — Commande envoyée</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#336CA8;--teal:#54BCB8;--green:#6FA84B;--navy:#1b356d;--sand:#f4efe7;--ink:#2b3a52;--line:#e6ddd0}
*{box-sizing:border-box}
body{margin:0;font-family:'Manrope',system-ui,sans-serif;color:var(--ink);background:#faf7f2}
header{background:#fff;border-bottom:1px solid var(--line)}
.nav{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:22px;padding:14px 20px}
.nav a{text-decoration:none;font-weight:600;color:var(--navy)}
.wrap{max-width:640px;margin:0 auto;padding:70px 20px;text-align:center}
.check{width:78px;height:78px;border-radius:50%;background:var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.check svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none}
h1{font-family:'Comfortaa',system-ui,sans-serif;color:var(--navy);font-size:28px;margin:0 0 12px}
p{font-size:16px;color:#55607a;line-height:1.6}
.ref{display:inline-block;margin:18px 0;padding:14px 22px;background:#fff;border:1px dashed var(--teal);border-radius:12px;font-size:18px;font-weight:700;color:var(--navy);letter-spacing:.5px}
.tip{font-size:14px;color:#7c8598}
.btns{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:13px 26px;border-radius:30px;text-decoration:none;font-weight:700}
.btn.p{background:var(--teal);color:#fff}
.btn.o{border:1.5px solid var(--navy);color:var(--navy)}
</style>
</head>
<body>
<header><nav class="nav">
  <a href="index.html"><strong style="font-family:Comfortaa;color:var(--navy)">DolmeG</strong></a>
  <a href="boutique.html" style="margin-left:auto">Boutique</a>
</nav></header>

<div class="wrap">
  <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
  <h1>Commande envoyée !</h1>
  <p>Merci, votre commande a bien été transmise. Nous vous contactons rapidement par téléphone pour la confirmer.</p>
  <div class="ref" id="ref">N° de commande : —</div>
  <p class="tip">Conservez ce numéro : il vous servira pour le suivi de votre commande.</p>
  <div class="btns">
    <a class="btn p" href="boutique.html">Retour à la boutique</a>
    <a class="btn o" href="index.html">Accueil</a>
  </div>
</div>

<script>
(function(){
  var params=new URLSearchParams(location.search);
  var n=params.get('n');
  if(n){document.getElementById('ref').textContent='N° de commande : '+n;}
  else{document.getElementById('ref').style.display='none';}
  try{localStorage.removeItem('dolmed_cart');}catch(e){}
})();
</script>
</body>
</html>
