<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Nature Touch — DolmeD</title>
<meta name="description" content="Lingettes, sprays répulsifs, anti-acariens, savons et solutions d'hygiène Nature Touch. Paiement à la livraison partout en Tunisie.">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#336CA8;--teal:#54BCB8;--vert:#6FA84B;--off:#F7F5F0;--sand:#EBE3D5;--ink:#22304A;
--r-pill:999px;--r-card:14px;--shadow:0 8px 24px rgba(51,108,168,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;font-size:16px;color:var(--ink);background:var(--off);line-height:1.55}
h1,h3{font-family:'Comfortaa',cursive;color:var(--navy)}
.wrap{max-width:1160px;margin:0 auto;padding:0 24px}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--sand)}
.nav{display:flex;align-items:center;gap:28px;padding:14px 24px;max-width:1160px;margin:0 auto}
.logo img{height:32px;display:block}
.nav a{color:var(--ink);text-decoration:none;font-size:15px;font-weight:500}
.nav .cart{margin-left:auto;font-weight:700;color:var(--navy)}
.head{padding:44px 0 10px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.head h1{font-size:clamp(24px,3.2vw,34px)}
.head img{height:42px}
.lead{color:#5b6b85;max-width:660px;padding-bottom:4px}
.filtres{display:flex;gap:10px;flex-wrap:wrap;padding:22px 0 30px}
.f{border:1.5px solid var(--sand);background:#fff;color:var(--ink);font-weight:700;font-size:14px;
padding:10px 18px;border-radius:var(--r-pill);cursor:pointer}
.f.on{background:var(--navy);border-color:var(--navy);color:#fff}
.f:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;padding-bottom:72px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border-radius:var(--r-card);box-shadow:var(--shadow);overflow:hidden;
display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(51,108,168,.16)}
.card.vedette{border:2px solid var(--teal)}
.ph{background:#fff;height:280px;display:flex;align-items:center;justify-content:center;position:relative;
border-bottom:1px solid #f0ede6;padding:16px;overflow:hidden}
.ph img{max-height:248px;max-width:92%;width:auto;object-fit:contain;cursor:zoom-in;transition:transform .25s}
.card:hover .ph img{transform:scale(1.07)}
.star{position:absolute;left:0;top:14px;background:var(--teal);color:#fff;font-size:11.5px;font-weight:800;
letter-spacing:.4px;padding:6px 14px 6px 12px;border-radius:0 999px 999px 0;z-index:2}
.st.promo{position:absolute;right:12px;top:14px;background:#B4552F;color:#fff;z-index:2}
.fmt{position:absolute;right:12px;bottom:10px;font-size:12px;font-weight:800;color:#8b96a8;
background:var(--off);border-radius:var(--r-pill);padding:4px 10px}
.tx{padding:14px 16px 18px;display:flex;flex-direction:column;gap:7px;flex:1}
.st{font-size:11px;font-weight:800;border-radius:var(--r-pill);padding:4px 10px;width:max-content}
.st.ok{color:var(--vert);background:#eef5e8}
.st.off{color:#B4552F;background:#faeee7}
h3{font-size:16.5px;line-height:1.35}
.sc{font-size:13px;color:var(--teal);font-weight:700}
.row{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto;padding-top:6px;gap:8px}
.prwrap{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.pr{font-size:22px;font-weight:800;color:var(--navy)}
.pr small{font-size:13px;font-weight:700}
.pr.sur{font-size:15px;color:#8b96a8;font-weight:700}
.old{font-size:14px;color:#9aa5b5;text-decoration:line-through;font-weight:700}
.pts{font-size:12px;font-weight:800;color:var(--vert);white-space:nowrap}
.btn{border:0;cursor:pointer;font-weight:700;font-size:14.5px;padding:13px 16px;border-radius:var(--r-pill)}
.add{background:var(--navy);color:#fff}
.add:hover{background:var(--teal)}
.add.off{background:var(--sand);color:#8a7f6d;cursor:not-allowed}
.btn:focus-visible,.zoomable:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
.lb{position:fixed;inset:0;background:rgba(20,32,54,.82);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:min(92vw,760px);max-height:88vh;background:#fff;border-radius:14px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.lb .x{position:absolute;top:22px;right:28px;background:#fff;border:0;border-radius:999px;width:44px;height:44px;
font-size:20px;font-weight:800;color:var(--navy);cursor:pointer}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

/* ===================== ZONE ADMIN — MODIFIEZ ICI =====================
   prix  : en dinars (ex. 42.000). null = "Prix sur demande".
   promo : prix remisé en dinars, ou null (prix normal barré + badge Promo).
   stock : true / false.
   Points fidélité automatiques (prix payé x 10).
====================================================================== */

const FAM_LABELS={all:"Tout",lingettes:"Lingettes",repulsif:"Répulsif moustiques",acariens:"Sprays anti-acariens",savons:"Savons sprays",surfaces:"Surfaces & air",mains:"Mains",toilettes:"Hygiène toilettes",sante:"Protection & santé"};
const fmtDT=v=>v==null?null:v.toFixed(3).replace('.',',');
function carte(p){
  const st=p.stock?'<span class="st ok">En stock</span>':'<span class="st off">Épuisé</span>';
  const promoBadge=(p.promo!=null&&p.stock)?'<span class="st promo">Promo</span>':'';
  const ribbon=p.phare?'<span class="star">Produit phare</span>':'';
  let prixHtml, pts;
  if(p.prix==null&&p.promo==null){ prixHtml='<span class="pr sur">Prix sur demande</span>'; pts=''; }
  else{
    const paye=p.promo!=null?p.promo:p.prix;
    pts='+'+Math.round(paye*10)+' pts';
    prixHtml=p.promo!=null
      ? '<span class="old">'+fmtDT(p.prix)+' DT</span><span class="pr">'+fmtDT(p.promo)+' <small>DT</small></span>'
      : '<span class="pr">'+fmtDT(p.prix)+' <small>DT</small></span>';
  }
  const btn=p.stock
    ? (p.prix==null&&p.promo==null?`<button class="btn add" type="button" data-sku="${p.sku}" data-devis="1">Demander un devis</button>`
                                  :`<button class="btn add" type="button" data-sku="${p.sku}">Ajouter au panier</button>`)
    : '<button class="btn add off" type="button" disabled>Me prévenir du retour</button>';
  return `<article class="card${p.phare?' vedette':''}" data-fam="${p.fam}">
    <div class="ph">${ribbon}${promoBadge}<img src="${IMAGES[p.img]}" alt="${p.nom} ${p.senteur} ${p.format}" loading="lazy" class="zoomable" tabindex="0"><span class="fmt">${p.format}</span></div>
    <div class="tx">${st}<h3>${p.nom}</h3><p class="sc">${p.senteur}</p>
      <div class="row"><span class="prwrap">${prixHtml}</span><span class="pts">${pts}</span></div>${btn}</div>
  </article>`;
}
function renderGrid(f){
  const g=document.getElementById('grid');
  const list=PRODUITS.filter(p=>f==='all'||p.fam===f);
  g.innerHTML=list.map(carte).join('');
  document.querySelectorAll('.zoomable').forEach(i=>{
    i.addEventListener('click',()=>openLb(i.src,i.alt));
    i.addEventListener('keydown',e=>{if(e.key==='Enter')openLb(i.src,i.alt);});
  });
  document.getElementById('countAll').textContent='Tout ('+PRODUITS.length+')';
}

const lb=document.getElementById('lb'), lbi=lb.querySelector('img');
function openLb(src,alt){lbi.src=src;lbi.alt=alt;lb.classList.add('on');document.body.style.overflow='hidden';}
function closeLb(){lb.classList.remove('on');document.body.style.overflow='';}
lb.addEventListener('click',closeLb);
lb.querySelector('.x').addEventListener('click',closeLb);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
document.querySelectorAll('.f').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); renderGrid(b.dataset.f);
}));
renderGrid('all');

// --- Panier (Étape A) ---
function majPanier(){var el=document.getElementById('cartCount');if(el)el.textContent=Cart.count();}
document.getElementById('grid').addEventListener('click',function(e){
  var b=e.target.closest('.add');
  if(!b||b.classList.contains('off')||b.dataset.devis)return;
  var sku=b.dataset.sku; if(!sku)return;
  Cart.add(sku,1); majPanier();
  var t=b.textContent; b.textContent='Ajouté ✓';
  setTimeout(function(){b.textContent=t;},900);
});
majPanier();
</script>
