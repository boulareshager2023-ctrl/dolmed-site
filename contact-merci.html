<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message envoyé — DolmeD Distribution</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#54BCB8;--green:#6FA84B;--navy:#1b356d;--line:#e6ddd0}
*{box-sizing:border-box}
body{margin:0;font-family:'Manrope',system-ui,sans-serif;color:#2b3a52;background:#faf7f2;line-height:1.7}
header{background:#fff;border-bottom:1px solid var(--line)}
.nav{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:22px;padding:14px 20px}
.nav .logo img{height:44px;display:block}
.nav a{text-decoration:none;font-weight:600;color:var(--navy)}
.wrap{max-width:620px;margin:0 auto;padding:70px 20px;text-align:center}
.check{width:78px;height:78px;border-radius:50%;background:var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.check svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none}
h1{font-family:'Comfortaa',system-ui,sans-serif;color:var(--navy);font-size:28px;margin:0 0 12px}
p{font-size:16px;color:#55607a}
.btns{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:13px 26px;border-radius:30px;text-decoration:none;font-weight:700}
.btn.p{background:var(--teal);color:#fff}
.btn.o{border:1.5px solid var(--navy);color:var(--navy)}
</style>
</head>
<body>
<header><nav class="nav">
  <a class="logo" href="index.html"><img src="logo.png" alt="DolmeD distribution"></a>
  <a href="boutique.html" style="margin-left:auto">Boutique</a>
</nav></header>

<div class="wrap">
  <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
  <h1>Message envoyé</h1>
  <p>Merci, nous avons bien reçu votre message. Notre équipe vous répond dans les meilleurs délais, généralement sous 24 à 48 heures ouvrées.</p>
  <p>Pour une demande urgente, appelez-nous au <strong>(+216) 98 473 620</strong>.</p>
  <div class="btns">
    <a class="btn p" href="boutique.html">Voir la boutique</a>
    <a class="btn o" href="index.html">Accueil</a>
  </div>
</div>
</body>
</html>
